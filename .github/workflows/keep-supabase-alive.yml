name: Keep Supabase awake

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://wahwdszfywobmyyuyihu.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'sb_publishable_ukJVlh6J3LcDiG5774YU7g_KGjiuB9P' }}
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/packages?select=id&limit=1")
          echo "HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Supabase ping failed with HTTP $code"
            exit 1
          fi
